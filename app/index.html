<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Day One</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Auto-layout grid (drag-reflow, resize-push, compaction) -->
<link rel="stylesheet" href="https://unpkg.com/react-grid-layout@1.4.4/css/styles.css" />
<link rel="stylesheet" href="https://unpkg.com/react-resizable@3.0.5/css/styles.css" />
<script src="https://unpkg.com/react-grid-layout@1.4.4/dist/react-grid-layout.min.js"></script>
<style>
  :root {
    --bg:       #111111;
    --bg-soft:  #161616;
    --bg-card:  #181818;
    --line:     rgba(255,255,255,0.06);
    --line-2:   rgba(255,255,255,0.10);
    --line-3:   rgba(255,255,255,0.16);
    --text:     #ece8e2;
    --text-dim: rgba(236,232,226,0.55);
    --text-mute:rgba(236,232,226,0.32);
    --accent:   #d97a4a;
    --accent-2: #e89066;
    --spotify:  #1db954;
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.005em;
  }
  body.dragging { cursor: grabbing !important; user-select: none; }
  body.resizing-c { cursor: nwse-resize !important; user-select: none; }
  body.dragging *, body.resizing-c * { user-select: none !important; }

  .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

  /* Checkbox */
  .check {
    width: 18px; height: 18px; flex: 0 0 18px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.18);
    background: transparent;
    position: relative; cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    display: grid; place-items: center;
  }
  .check:hover { border-color: rgba(255,255,255,0.32); }
  .check svg { width: 12px; height: 12px; overflow: visible; }
  .check .tick {
    fill: none; stroke: var(--accent);
    stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 18; stroke-dashoffset: 18;
    transition: stroke-dashoffset .32s cubic-bezier(.65,.05,.36,1);
  }
  .check.checked { border-color: var(--accent); background: rgba(217,122,74,0.10); }
  .check.checked .tick { stroke-dashoffset: 0; }

  /* Strike */
  .todo-text { position: relative; display: inline; transition: color .5s ease; }
  .todo-text::after {
    content: ""; position: absolute;
    left: -2px; right: -2px; top: 55%; height: 1px;
    background: var(--accent);
    transform: scaleX(0); transform-origin: left center;
    transition: transform .5s cubic-bezier(.65,.05,.36,1);
  }
  .todo-text.done { color: var(--text-mute); }
  .todo-text.done::after { transform: scaleX(1); }

  /* Modal */
  .modal-backdrop { opacity: 0; transition: opacity .25s ease; }
  .modal-backdrop.open { opacity: 1; }
  .modal-panel {
    opacity: 0; transform: scale(.97) translateY(6px);
    transition: opacity .26s ease, transform .3s cubic-bezier(.22,1.2,.62,1);
  }
  .modal-backdrop.open .modal-panel { opacity: 1; transform: scale(1) translateY(0); }

  /* Mic pulse */
  .mic-recording::before, .mic-recording::after {
    content: ""; position: absolute; inset: -2px;
    border-radius: 9999px; background: rgba(217,122,74,0.28);
    animation: micPulse 1.5s ease-out infinite;
  }
  .mic-recording::after { animation-delay: .55s; }
  @keyframes micPulse {
    0% { transform: scale(.9); opacity: .85; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise { animation: rise .4s cubic-bezier(.22,1,.36,1) both; }

  @keyframes nowPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(217,122,74,0.50); }
    50%     { box-shadow: 0 0 0 5px rgba(217,122,74,0); }
  }
  .now-dot { animation: nowPulse 2.4s ease-out infinite; }

  .sidebar-content { transition: opacity .15s ease; }
  .sidebar-collapsed .sidebar-content { opacity: 0; pointer-events: none; }

  /* Task expand */
  .task-details {
    overflow: hidden;
    max-height: 0; opacity: 0;
    transform: translateY(-2px);
    transition: max-height .38s cubic-bezier(.4,0,.2,1),
                opacity .25s ease, transform .3s ease, margin-top .3s ease;
  }
  .task-box.expanded .task-details {
    max-height: 240px; opacity: 1; transform: translateY(0); margin-top: 10px;
  }
  .task-box { transition: background-color .25s ease, border-color .25s ease; }
  .task-box.expanded {
    background-color: rgba(255,255,255,0.025);
    border-color: rgba(255,255,255,0.10);
  }

  /* Widget shell — fills its grid cell */
  .widget {
    position: relative;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--line);
    border-radius: 10px;
    transition: border-color .25s ease, box-shadow .2s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .widget:hover { border-color: var(--line-2); }
  .widget.dragging {
    cursor: grabbing;
    box-shadow: 0 16px 36px -10px rgba(0,0,0,0.65);
    border-color: var(--line-3);
    z-index: 20;
  }
  .widget-x {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    border-radius: 6px;
    color: var(--text-mute);
    opacity: 0;
    transition: opacity .15s ease, background-color .15s ease, color .15s ease;
    z-index: 3;
  }
  .widget:hover .widget-x { opacity: 1; }
  .widget-x:hover { background: rgba(255,255,255,0.06); color: var(--text); }

  .widget-title {
    padding: 14px 18px 8px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-mute);
    display: flex; align-items: center; gap: 6px;
    cursor: grab;
    user-select: none;
  }
  .widget-title:active { cursor: grabbing; }
  .widget-title-static { cursor: default; }
  .widget-body { flex: 1; min-height: 0; padding: 0 18px 18px; display: flex; flex-direction: column; }

  /* react-grid-layout integration */
  .react-grid-item.react-grid-placeholder {
    background: rgba(217,122,74,0.16) !important;
    border: 1px dashed rgba(217,122,74,0.55);
    border-radius: 10px;
    opacity: 1 !important;
    transition-duration: .12s;
  }
  .react-grid-item.react-draggable-dragging {
    z-index: 30;
    box-shadow: 0 16px 36px -10px rgba(0,0,0,0.65);
  }
  .react-grid-item.react-draggable-dragging .widget { border-color: var(--line-3); }
  .react-grid-item.resizing { z-index: 30; }
  /* Smoother reflow: widgets that move out of the way glide on a soft curve.
     The item being dragged/resized has no transition (follows the cursor 1:1). */
  .react-grid-item {
    transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
                width 220ms cubic-bezier(0.22, 1, 0.36, 1),
                height 220ms cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .react-grid-item.cssTransforms { transition-property: transform, width, height; }
  .react-grid-item.react-draggable-dragging,
  .react-grid-item.resizing { transition: none !important; }
  .react-grid-item.react-grid-placeholder {
    transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1) !important;
  }
  /* Resize handles: invisible grab zones (no default triangle), except a subtle SE marker */
  .react-resizable-handle { background-image: none !important; opacity: 0; }
  .widget .react-resizable-handle,
  .react-grid-item:hover .react-resizable-handle { opacity: 1; }
  .react-resizable-handle-se::after {
    content: ""; position: absolute; right: 4px; bottom: 4px;
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-bottom: 6px solid rgba(255,255,255,0.22);
  }

  /* Snap-raster overlay (toggle in Personal) */
  .grid-wrap {
    position: relative;
    border-radius: 12px;
    background-position: 0 0;
    background-image: none;
    transition: background-image .15s ease;
  }
  .grid-wrap.show-grid {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: var(--cell-w) var(--cell-h);
  }

  /* Loading splash — handwriting draw-in (21st.dev kokonutd style, native) */
  .splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    transition: opacity .5s ease;
  }
  .splash.fade { opacity: 0; pointer-events: none; }
  .hw-text {
    fill: transparent;
    stroke: var(--text);
    stroke-width: 1.1;
    stroke-linejoin: round; stroke-linecap: round;
    stroke-dasharray: 520;
    stroke-dashoffset: 520;
    animation: hwDraw 1.5s cubic-bezier(.6,.05,.2,1) forwards, hwFill .6s ease 1.35s forwards;
  }
  @keyframes hwDraw { to { stroke-dashoffset: 0; } }
  @keyframes hwFill { to { fill: var(--text); } }
  .splash-sub {
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--text-mute);
    opacity: 0; animation: subIn .6s ease 1.5s forwards;
  }
  @keyframes subIn { to { opacity: 1; } }

  /* Skeleton shimmer for widgets */
  .skel { position: relative; overflow: hidden; background: rgba(255,255,255,0.03);
          border: 1px solid var(--line); border-radius: 10px; }
  .skel::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: translateX(-100%); animation: shimmer 1.3s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  /* Chat typing indicator */
  .typing { display: inline-flex; gap: 3px; align-items: center; height: 8px; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-mute);
    animation: typingB 1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes typingB { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

  /* Inline task edit inputs */
  .task-input {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 6px 9px;
    font-size: 12.5px;
    color: var(--text-dim);
    outline: none;
    transition: border-color .15s ease;
  }
  .task-input:focus { border-color: var(--line-3); color: var(--text); }
  .task-input::placeholder { color: var(--text-mute); }
  .task-input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* Todo timeline cell (static grid anchor) */
  .todo-cell { width: 100%; height: 100%; display: flex; flex-direction: column; padding-left: 4px; }
  .todo-scroll { flex: 1; min-height: 0; overflow-y: auto; }

  ::selection { background: rgba(217,122,74,0.32); color: #fef4ec; }

  button:focus, [role="checkbox"]:focus { outline: none; }
  button:focus-visible, [role="checkbox"]:focus-visible {
    box-shadow: 0 0 0 2px rgba(217,122,74,0.4);
  }

  /* Spotify equalizer */
  .eq { display: inline-flex; align-items: end; gap: 2px; height: 11px; }
  .eq span {
    display: block; width: 2px; background: var(--spotify);
    border-radius: 1px; transform-origin: bottom;
    animation: eqB 1s ease-in-out infinite;
  }
  .eq span:nth-child(1) { animation-delay: 0s; }
  .eq span:nth-child(2) { animation-delay: .15s; }
  .eq span:nth-child(3) { animation-delay: .3s; }
  .eq span:nth-child(4) { animation-delay: .45s; }
  @keyframes eqB {
    0%,100% { height: 3px; }
    50%     { height: 11px; }
  }

  /* Heute label */
  .heute-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-mute);
    padding: 0 0 10px 72px;
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#111111">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="120" y="300" width="220" height="200" rx="20" fill="none" stroke="#3a3a3a" stroke-width="6"/>
    <rect x="500" y="250" width="200" height="300" rx="20" fill="none" stroke="#3a3a3a" stroke-width="6"/>
    <circle cx="800" cy="400" r="100" fill="none" stroke="#8aa17d" stroke-width="14" stroke-dasharray="470 628" stroke-linecap="round" transform="rotate(-90 800 400)"/>
    <text x="600" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="64" font-weight="600" fill="#ece8e2">Day One</text>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback } = React;

/* ---------- Icons ---------- */
const Icon = ({ size = 16, stroke = 1.6, fill = "none", children }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
       viewBox="0 0 24 24" fill={fill} stroke="currentColor"
       strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);
const PanelLeft  = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></Icon>;
const PanelRight = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></Icon>;
const MicIco     = (p) => <Icon {...p}><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/></Icon>;
const ArrowUp    = (p) => <Icon {...p}><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></Icon>;
const UserIco    = (p) => <Icon {...p}><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></Icon>;
const PlusIco    = (p) => <Icon {...p}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>;
const XIco       = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
const Edit2      = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></Icon>;
const TrashIco   = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></Icon>;
const PlayIco    = (p) => <Icon {...p}><polygon points="6 3 20 12 6 21 6 3"/></Icon>;
const PauseIco   = (p) => <Icon {...p}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></Icon>;
const SkipIco    = (p) => <Icon {...p}><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" x2="19" y1="5" y2="19"/></Icon>;
const HeartIco   = ({ filled, size=15 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
       fill={filled ? "currentColor" : "none"} stroke="currentColor"
       strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/>
  </svg>
);
const NoteIco    = (p) => <Icon {...p}><path d="M4 4a2 2 0 0 1 2-2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></Icon>;
const TargetIco  = (p) => <Icon {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/></Icon>;
const TrendIco   = (p) => <Icon {...p}><path d="m3 17 6-6 4 4 8-8"/><path d="M14 7h7v7"/></Icon>;
const MusicIco   = (p) => <Icon {...p}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></Icon>;
const EyeIco     = (p) => <Icon {...p}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></Icon>;
const ChevronDown= (p) => <Icon {...p}><path d="m6 9 6 6 6-6"/></Icon>;
const CheckIco   = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5"/></Icon>;

const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

/* Paler red→green for Tagesziel */
function progressColor(pct) {
  // hue 5 (warm red) → 138 (sage green); muted saturation
  const hue = 5 + pct * 133;
  return `hsl(${hue.toFixed(0)}, 38%, 58%)`;
}

/* ---------- Checkbox ---------- */
function Check({ checked, onToggle }) {
  const stop = (e) => e.stopPropagation();
  const handle = (e) => { e.stopPropagation(); onToggle(); };
  return (
    <span
      className={`check ${checked ? "checked" : ""}`}
      onClick={handle} onDoubleClick={stop} onMouseDown={stop} onMouseUp={stop}
      role="checkbox" aria-checked={checked} tabIndex={0}
      onKeyDown={(e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault(); e.stopPropagation(); onToggle();
        }
      }}
    >
      <svg viewBox="0 0 16 16">
        <path className="tick" d="M3 8.6 L6.6 12 L13 4.6" />
      </svg>
    </span>
  );
}

/* ---------- "Now" line on the timeline (follows the real clock) ---------- */
function NowMarker({ min }) {
  const label = `${String(Math.floor(min / 60)).padStart(2, "0")}:${String(min % 60).padStart(2, "0")}`;
  return (
    <div className="grid items-center select-none" style={{ gridTemplateColumns: "54px 18px 1fr" }}>
      <div className="pr-3 text-right text-[11px] tabular-nums font-semibold text-[color:var(--accent-2)]">{label}</div>
      <div className="relative flex justify-center">
        <span className="relative z-10 w-[9px] h-[9px] rounded-full bg-[color:var(--accent)] now-dot"
              style={{ boxShadow: "0 0 0 3px var(--bg)" }} />
      </div>
      <div className="h-px rounded-full bg-[color:var(--accent)]"
           style={{ boxShadow: "0 0 8px rgba(217,122,74,0.55)" }} />
    </div>
  );
}

/* ---------- Timeline row ---------- */
function TodoRow({ todo, idx, isNow, expanded, startEditing, onExpand, onCollapse, onToggle, onDelete, onUpdate, onCancel }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ time: todo.time, title: todo.title, duration: todo.duration || "", note: todo.note || "" });
  useEffect(() => {
    if (startEditing) { setDraft({ time: todo.time, title: todo.title, duration: todo.duration || "", note: todo.note || "" }); setEditing(true); }
  }, [startEditing]);
  const beginEdit = (e) => { e && e.stopPropagation(); setDraft({ time: todo.time, title: todo.title, duration: todo.duration || "", note: todo.note || "" }); setEditing(true); };
  const saveEdit = (e) => {
    e && e.stopPropagation();
    onUpdate(todo.id, { time: draft.time || "12:00", title: draft.title.trim() || "Aufgabe", duration: draft.duration, note: draft.note });
    setEditing(false);
  };
  const handleToggleExpand = (e) => {
    e.stopPropagation();
    if (expanded) onCollapse(); else onExpand(todo.id);
  };
  const stop = (e) => e.stopPropagation();
  return (
    <div className="rise grid items-start"
         style={{ gridTemplateColumns: "54px 18px 1fr", animationDelay: `${idx * 35}ms` }}>
      <div className="pt-[10px] text-right pr-3">
        <div className="text-[12px] tabular-nums text-[color:var(--text-dim)] font-medium tracking-tight">
          {todo.time}
        </div>
      </div>
      <div className="relative flex justify-center pt-[14px]">
        <div className="absolute top-0 bottom-[-18px] w-px bg-[color:var(--line)]" />
        <span className={`relative z-10 w-[7px] h-[7px] rounded-full ${
          isNow ? "bg-[color:var(--accent)] now-dot"
                : todo.done ? "bg-[color:var(--accent)]/35"
                : "bg-[rgba(255,255,255,0.18)]"
        }`} />
      </div>
      <div className="pb-2.5">
        <div onClick={handleToggleExpand}
          className={`task-box ${expanded ? "expanded" : ""} relative pl-3 pr-3 py-2.5 rounded-lg border border-transparent hover:border-[color:var(--line)] cursor-pointer select-none`}
          aria-expanded={expanded} title="Klick für Details">
          <div className="flex items-center gap-3">
            <Check checked={todo.done} onToggle={() => onToggle(todo.id)} />
            <span className={`todo-text flex-1 min-w-0 truncate text-[14px] leading-snug ${todo.done ? "done" : "text-[color:var(--text)]"}`}>
              {todo.title}
            </span>
          </div>
          <div className="task-details">
            <div className="pl-[30px] pr-1">
              {editing ? (
                <div onMouseDown={stop} onDoubleClick={stop}>
                  <div className="flex items-center gap-2">
                    <input type="time" value={draft.time} onChange={(e) => setDraft(d => ({ ...d, time: e.target.value }))}
                      className="task-input tabular-nums w-[100px]" />
                    <input value={draft.duration} onChange={(e) => setDraft(d => ({ ...d, duration: e.target.value }))}
                      placeholder="Dauer" className="task-input flex-1" />
                  </div>
                  <input value={draft.title} autoFocus onChange={(e) => setDraft(d => ({ ...d, title: e.target.value }))}
                    onKeyDown={(e) => { if (e.key === "Enter") saveEdit(e); }}
                    placeholder="Titel" className="task-input w-full mt-2 text-[14px] text-[color:var(--text)]" />
                  <textarea value={draft.note} onChange={(e) => setDraft(d => ({ ...d, note: e.target.value }))}
                    placeholder="Notiz (optional)" rows={2} className="task-input w-full mt-2 resize-none" />
                  <div className="mt-2.5 flex items-center gap-1.5">
                    <button onClick={saveEdit}
                      className="inline-flex items-center gap-1.5 text-[11.5px] text-white bg-[color:var(--accent)] hover:bg-[color:var(--accent-2)] px-2.5 py-1 rounded-md transition-colors">
                      Speichern
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); setEditing(false); onCancel && onCancel(todo.id); }}
                      className="inline-flex items-center gap-1.5 text-[11.5px] text-[color:var(--text-dim)] hover:text-[color:var(--text)] px-2 py-1 rounded-md border border-[color:var(--line)] transition-colors">
                      Abbrechen
                    </button>
                  </div>
                </div>
              ) : (
                <>
                  <div className="flex items-center gap-3 text-[11px] tabular-nums text-[color:var(--text-mute)] uppercase tracking-[0.16em]">
                    <span>{todo.time}</span>
                    {todo.duration && <span className="w-1 h-1 rounded-full bg-[color:var(--line-3)]" />}
                    {todo.duration && <span>{todo.duration}</span>}
                  </div>
                  {todo.note && (
                    <p className="mt-2.5 text-[13px] leading-relaxed text-[color:var(--text-dim)]">{todo.note}</p>
                  )}
                  <div className="mt-3 flex items-center gap-1.5">
                    <button onClick={beginEdit}
                      className="inline-flex items-center gap-1.5 text-[11.5px] text-[color:var(--text-dim)] hover:text-[color:var(--text)] px-2 py-1 rounded-md border border-[color:var(--line)] hover:border-[color:var(--line-2)] transition-colors">
                      <Edit2 size={11}/> Bearbeiten
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); onDelete(todo.id); }}
                      className="inline-flex items-center gap-1.5 text-[11.5px] text-[color:var(--text-dim)] hover:text-[color:var(--accent-2)] px-2 py-1 rounded-md border border-[color:var(--line)] hover:border-[color:var(--line-2)] transition-colors">
                      <TrashIco size={11}/> Entfernen
                    </button>
                    <span className="ml-auto text-[10px] uppercase tracking-[0.16em] text-[color:var(--text-mute)]">
                      Esc · schließen
                    </span>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Tagesziel (red→pale green) ---------- */
function TageszielWidget({ done, total, onDismiss }) {
  const pct = total ? done / total : 0;
  const color = progressColor(pct);
  const ringRef = useRef(null);
  const [ringBox, setRingBox] = useState({ w: 220, h: 180 });
  useEffect(() => {
    if (!ringRef.current) return;
    const ro = new ResizeObserver((es) => {
      const cr = es[0].contentRect;
      setRingBox({ w: cr.width, h: cr.height });
    });
    ro.observe(ringRef.current);
    return () => ro.disconnect();
  }, []);
  const size = Math.max(90, Math.min(ringBox.w - 30, ringBox.h - 56, 190));
  const stroke = 10;
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const dash = C * pct;
  const label =
    pct >= 1   ? "Geschafft" :
    pct >= 0.7 ? "Fast fertig" :
    pct >= 0.4 ? "Auf Kurs" :
    pct > 0    ? "Angefangen" :
    "Noch nicht";

  return (
    <WidgetShell onDismiss={onDismiss} title="Tagesziel">
      <div ref={ringRef} className="flex-1 flex flex-col items-center justify-center min-h-0">
        <div className="relative" style={{ width: size, height: size }}>
          <svg width={size} height={size}>
            <circle cx={size/2} cy={size/2} r={r}
                    fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r}
                    fill="none" stroke={color} strokeWidth={stroke}
                    strokeDasharray={`${dash} ${C}`}
                    strokeLinecap="round"
                    transform={`rotate(-90 ${size/2} ${size/2})`}
                    style={{ transition: "stroke-dasharray .7s cubic-bezier(.22,1,.36,1), stroke .5s ease" }}/>
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <div className="text-[28px] font-semibold tabular-nums leading-none" style={{ color }}>
              {Math.round(pct * 100)}%
            </div>
            <div className="text-[10.5px] uppercase tracking-[0.18em] text-[color:var(--text-mute)] mt-1.5 tabular-nums">
              {done}/{total}
            </div>
          </div>
        </div>
        <div className="mt-3 text-[11.5px] text-[color:var(--text-dim)] flex items-center gap-1.5">
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: color }}/>
          {label}
        </div>
      </div>
    </WidgetShell>
  );
}

/* ---------- Verlauf (straight polyline) ---------- */
function VerlaufWidget({ onDismiss, days }) {
  const data = days && days.length ? days : [];
  const hasData = data.some(d => d.has);

  const wrapRef = useRef(null);
  const [box, setBox] = useState({ w: 280, h: 120 });
  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver((entries) => {
      const cr = entries[0].contentRect;
      setBox({ w: cr.width, h: cr.height });
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const pad = { t: 12, r: 6, b: 22, l: 6 };
  const W = Math.max(box.w, 80);
  const H = Math.max(box.h, 80);
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const stepX = data.length > 1 ? innerW / (data.length - 1) : 0;
  const points = data.map((d, i) => ({
    x: pad.l + i * stepX,
    y: pad.t + (1 - d.p) * innerH,
    p: d.p, wd: d.wd
  }));
  const lineD = points.map((p, i) => `${i ? "L" : "M"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");

  const last = data[data.length - 1].p;
  const prev = data[data.length - 2].p;
  const delta = Math.round((last - prev) * 100);

  return (
    <WidgetShell onDismiss={onDismiss} title="Verlauf · 7 Tage">
      <div className="flex items-baseline justify-between mb-2">
        <div className="flex items-baseline gap-2">
          <span className="text-[18px] font-semibold tabular-nums text-[color:var(--text)]">
            {Math.round(last * 100)}%
          </span>
          <span className="text-[11px] tabular-nums text-[color:var(--text-dim)]">
            {delta >= 0 ? "+" : ""}{delta}%
          </span>
        </div>
        <span className="text-[10px] uppercase tracking-[0.18em] text-[color:var(--text-mute)]">heute</span>
      </div>
      <div ref={wrapRef} className="flex-1 min-h-0 relative">
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} className="absolute inset-0">
          <line x1={pad.l} x2={W-pad.r} y1={pad.t+innerH} y2={pad.t+innerH}
                stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
          <path d={lineD} fill="none" stroke="rgba(236,232,226,0.85)"
                strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
          {points.map((pt, i) => {
            const isLast = i === points.length - 1;
            return (
              <circle key={i} cx={pt.x} cy={pt.y} r={isLast ? 3 : 2}
                      fill={isLast ? "var(--text)" : "var(--bg)"}
                      stroke="rgba(236,232,226,0.85)" strokeWidth="1.2"/>
            );
          })}
          {points.map((pt, i) => (
            <text key={`l${i}`} x={pt.x} y={H-6} textAnchor="middle"
                  fontSize="9.5" fill="rgba(236,232,226,0.32)"
                  style={{ textTransform: "uppercase", letterSpacing: "0.14em" }}>
              {data[i].wd}
            </text>
          ))}
        </svg>
      </div>
    </WidgetShell>
  );
}

/* ---------- YouTube Playlist Player ---------- */
const YT_PLAYLIST_KEY = "dayone-yt-playlist";
const YT_DEFAULT_PLAYLIST = [];

function extractYTId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function YouTubeWidget({ onDismiss }) {
  const playerRef = useRef(null);
  const ytReadyRef = useRef(false);
  const playlistRef = useRef([]);
  const idxRef = useRef(0);
  const [playlist, setPlaylist] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(YT_PLAYLIST_KEY) || "null");
      if (!Array.isArray(saved)) return [];
      return saved;
    } catch { return []; }
  });
  const [idx, setIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [addUrl, setAddUrl] = useState("");
  const [addErr, setAddErr] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [adding, setAdding] = useState(false);
  const divId = useRef("yt-" + Math.random().toString(36).slice(2)).current;

  // Keep refs in sync for use inside YT callbacks (stale closure avoidance)
  useEffect(() => { playlistRef.current = playlist; }, [playlist]);
  useEffect(() => { idxRef.current = idx; }, [idx]);

  // Persist playlist
  useEffect(() => {
    try { localStorage.setItem(YT_PLAYLIST_KEY, JSON.stringify(playlist)); } catch {}
  }, [playlist]);

  // Create YT player once
  useEffect(() => {
    const create = () => {
      if (playerRef.current) return;
      playerRef.current = new window.YT.Player(divId, {
        height: "1", width: "1",
        playerVars: { autoplay: 0, controls: 0, rel: 0 },
        events: {
          onReady: () => {
            ytReadyRef.current = true;
            // Ersten Song laden (ohne Autoplay — User muss Play drücken)
            const vid = playlistRef.current[0]?.id;
            if (vid) playerRef.current?.cueVideoById(vid);
          },
          onStateChange: (e) => {
            const S = window.YT.PlayerState;
            if (e.data === S.PLAYING) setPlaying(true);
            if (e.data === S.PAUSED || e.data === S.CUED) setPlaying(false);
            if (e.data === S.ENDED) {
              const len = playlistRef.current.length;
              if (len > 0) {
                const next = (idxRef.current + 1) % len;
                setIdx(next);
                playerRef.current?.loadVideoById(playlistRef.current[next]?.id);
              }
            }
          },
        },
      });
    };
    if (window.YT?.Player) {
      create();
    } else {
      const prev = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = () => { prev?.(); create(); };
      if (!document.getElementById("yt-api-script")) {
        const s = document.createElement("script");
        s.id = "yt-api-script"; s.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(s);
      }
    }
    return () => { try { playerRef.current?.destroy(); } catch {} playerRef.current = null; };
  }, []);

  const cueTrack = useCallback((i, autoplay = false) => {
    const vid = playlist[i]?.id;
    if (!vid || !playerRef.current) return;
    if (autoplay) playerRef.current.loadVideoById(vid);
    else playerRef.current.cueVideoById(vid);
  }, [playlist]);

  const togglePlay = () => {
    if (!playerRef.current) return;
    if (playing) { playerRef.current.pauseVideo(); }
    else {
      if (playlist.length === 0) return;
      if (!ytReadyRef.current) return;
      // If nothing cued yet, cue first
      const state = playerRef.current.getPlayerState?.();
      if (state === -1 || state === undefined) cueTrack(idx, true);
      else playerRef.current.playVideo();
    }
  };

  const skip = (dir) => {
    if (playlist.length === 0) return;
    const next = (idx + dir + playlist.length) % playlist.length;
    setIdx(next);
    cueTrack(next, playing);
  };

  const selectTrack = (i) => {
    setIdx(i);
    cueTrack(i, true);
  };

  const addTrack = async () => {
    const raw = addUrl.trim();
    const id = extractYTId(raw);
    if (!id) { setAddErr("Ungültige YouTube-URL"); return; }
    if (playlist.some(t => t.id === id)) { setAddErr("Bereits in der Playlist"); return; }
    setAdding(true);
    let title = id;
    try {
      const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      if (r.ok) { const j = await r.json(); title = j.title || id; }
    } catch {}
    setPlaylist(p => [...p, { id, title }]);
    setAddUrl(""); setAddErr(""); setShowAdd(false); setAdding(false);
  };

  const removeTrack = (i) => {
    setPlaylist(p => p.filter((_, j) => j !== i));
    if (idx >= i && idx > 0) setIdx(x => x - 1);
  };

  const current = playlist[idx];

  return (
    <WidgetShell onDismiss={onDismiss} title="Musik · YouTube">
      {/* Hidden YT player iframe mount point */}
      <div id={divId} style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }} />

      <div className="flex-1 flex flex-col gap-2.5 min-h-0">
        {playlist.length === 0 ? (
          <div className="flex-1 flex flex-col items-center justify-center gap-2 text-center">
            <MusicIco size={22} stroke={1.2} />
            <div className="text-[11px] uppercase tracking-[0.18em] text-[color:var(--text-mute)] mt-1">Playlist leer</div>
            <div className="text-[12px] text-[color:var(--text-dim)]">Füge YouTube-Links hinzu</div>
          </div>
        ) : (
          <>
            {/* Current track info */}
            <div className="flex items-center gap-3 shrink-0">
              <div className="shrink-0 w-[48px] h-[48px] rounded-md overflow-hidden border border-[color:var(--line-2)] bg-black/40">
                {current && <img src={`https://img.youtube.com/vi/${current.id}/mqdefault.jpg`} alt="" className="w-full h-full object-cover" draggable="false" />}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[13.5px] font-semibold text-[color:var(--text)] truncate leading-tight">
                  {current?.title || "–"}
                </div>
                <div className="text-[11px] text-[color:var(--text-mute)] mt-0.5 tabular-nums">{idx + 1} / {playlist.length}</div>
              </div>
              {playing && <span className="eq shrink-0"><span/><span/><span/><span/></span>}
            </div>

            {/* Controls */}
            <div className="flex items-center justify-center gap-2 shrink-0">
              <button onClick={() => skip(-1)} onMouseDown={e => e.stopPropagation()}
                      className="w-8 h-8 grid place-items-center rounded-full text-[color:var(--text-dim)] hover:text-[color:var(--text)] -scale-x-100" aria-label="Zurück">
                <SkipIco size={13}/>
              </button>
              <button onClick={togglePlay} onMouseDown={e => e.stopPropagation()}
                className="w-9 h-9 grid place-items-center rounded-full bg-white/[0.06] border border-[color:var(--line-2)] text-[color:var(--text)] hover:bg-white/[0.1] transition-colors"
                aria-label={playing ? "Pause" : "Play"}>
                {playing ? <PauseIco size={13} fill="currentColor" stroke={0}/> : <PlayIco size={13} fill="currentColor" stroke={0}/>}
              </button>
              <button onClick={() => skip(1)} onMouseDown={e => e.stopPropagation()}
                      className="w-8 h-8 grid place-items-center rounded-full text-[color:var(--text-dim)] hover:text-[color:var(--text)]" aria-label="Weiter">
                <SkipIco size={13}/>
              </button>
            </div>

            {/* Playlist */}
            <div className="flex-1 min-h-0 overflow-y-auto scroll-thin space-y-0.5">
              {playlist.map((t, i) => (
                <div key={t.id} onClick={() => selectTrack(i)}
                     className={`group flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer transition-colors
                       ${i === idx ? "bg-white/[0.06] text-[color:var(--text)]" : "text-[color:var(--text-dim)] hover:bg-white/[0.03] hover:text-[color:var(--text)]"}`}>
                  <img src={`https://img.youtube.com/vi/${t.id}/default.jpg`} alt="" className="w-7 h-7 rounded object-cover shrink-0" />
                  <span className="flex-1 min-w-0 text-[11.5px] truncate">{t.title}</span>
                  <button onClick={e => { e.stopPropagation(); removeTrack(i); }}
                    onMouseDown={e => e.stopPropagation()}
                    className="opacity-0 group-hover:opacity-100 w-5 h-5 grid place-items-center rounded text-[color:var(--text-mute)] hover:text-[color:var(--accent-2)] transition-all shrink-0"
                    aria-label="Entfernen">
                    <XIco size={10}/>
                  </button>
                </div>
              ))}
            </div>
          </>
        )}

        {/* Add track */}
        {showAdd ? (
          <div className="flex flex-col gap-1.5 shrink-0">
            <input autoFocus value={addUrl} onChange={e => { setAddUrl(e.target.value); setAddErr(""); }}
              onKeyDown={e => { if (e.key === "Enter") addTrack(); if (e.key === "Escape") { setShowAdd(false); setAddErr(""); } }}
              placeholder="YouTube-URL einfügen …"
              className="task-input w-full text-[12px]" />
            {addErr && <div className="text-[11px] text-[color:var(--accent-2)]">{addErr}</div>}
            <div className="flex gap-1.5">
              <button onClick={addTrack} disabled={adding}
                className="flex-1 text-[11px] py-1 rounded-md bg-[color:var(--accent)] text-white hover:bg-[color:var(--accent-2)] disabled:opacity-50 transition-colors">
                {adding ? "Lädt …" : "Hinzufügen"}
              </button>
              <button onClick={() => { setShowAdd(false); setAddErr(""); }} onMouseDown={e => e.stopPropagation()}
                className="text-[11px] px-2 py-1 rounded-md border border-[color:var(--line)] text-[color:var(--text-dim)] hover:text-[color:var(--text)] transition-colors">
                Abbrechen
              </button>
            </div>
          </div>
        ) : (
          <button onClick={() => setShowAdd(true)} onMouseDown={e => e.stopPropagation()}
            className="shrink-0 flex items-center gap-1.5 text-[11px] text-[color:var(--text-mute)] hover:text-[color:var(--text)] transition-colors">
            <PlusIco size={11}/> Song hinzufügen
          </button>
        )}
      </div>
    </WidgetShell>
  );
}

/* ---------- KI-Beobachtung (real: analyses your data) ---------- */
const OBS_KEY = "dayone-observation-v1";
const ANALYSIS_AFTER_DAYS = 7; // start behavioural analysis only after a week of data
function KIObservationWidget({ onDismiss, data, onObservation }) {
  const { todos = [], notes = "", profile = {}, history = {} } = data || {};
  const cached = (() => { try { return JSON.parse(localStorage.getItem(OBS_KEY) || "null"); } catch { return null; } })();
  const [obs, setObs] = useState((DEMO ? (data?.observation || "") : "") || cached?.text || "");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const daysTracked = Object.keys(history).length;
  const ready = daysTracked >= ANALYSIS_AFTER_DAYS;

  // Last 7 days of real completion ratio for the habit dots.
  const week = useMemo(() => {
    const out = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = dateKey(d);
      out.push({
        letter: d.toLocaleDateString("de-DE", { weekday: "narrow" }),
        pct: history[key] ?? 0,
        has: key in history,
        isToday: i === 0,
      });
    }
    return out;
  }, [history]);

  const generate = async () => {
    if (busy) return;
    setBusy(true); setErr("");
    try {
      const now = new Date().toLocaleString("de-DE", { weekday: "long", day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" });
      const res = await fetch("/api/observe", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ context: { todos, notes, profile, history, now } }),
      });
      const j = await res.json();
      const text = j.observation || "Noch zu wenig Daten für eine Beobachtung.";
      setObs(text);
      onObservation && onObservation(text);
      try { localStorage.setItem(OBS_KEY, JSON.stringify({ text, day: dateKey() })); } catch {}
    } catch (e) {
      setErr("Server nicht erreichbar.");
    } finally { setBusy(false); }
  };

  // Auto-generate once per day — only after a full week of tracked data.
  useEffect(() => {
    if (DEMO) return;
    if (!ready) return;
    if (cached?.day === dateKey()) return;
    if (todos.length === 0) return;
    generate();
  }, [ready]);

  return (
    <WidgetShell onDismiss={onDismiss} title="KI · Beobachtung">
      <div className="flex-1 min-h-0 flex flex-col">
        <div className="flex-1 min-h-0 overflow-y-auto scroll-thin pr-1">
          {busy ? (
            <div className="h-full flex items-center justify-center gap-2 text-[11px] text-[color:var(--text-mute)] uppercase tracking-[0.18em]">
              <span className="typing"><span/><span/><span/></span> analysiert deine Daten
            </div>
          ) : !ready ? (
            <div className="h-full flex flex-col items-center justify-center text-center gap-2">
              <div className="text-[11px] uppercase tracking-[0.18em] text-[color:var(--text-mute)]">Sammelt deine Gewohnheiten</div>
              <div className="text-[12px] text-[color:var(--text-dim)]">
                Verhaltensanalyse startet nach 7 Tagen — noch {Math.max(0, ANALYSIS_AFTER_DAYS - daysTracked)} {ANALYSIS_AFTER_DAYS - daysTracked === 1 ? "Tag" : "Tage"}.
              </div>
              <div className="text-[11px] tabular-nums text-[color:var(--text-mute)]">Tag {Math.min(daysTracked, ANALYSIS_AFTER_DAYS)} / {ANALYSIS_AFTER_DAYS}</div>
            </div>
          ) : obs ? (
            <p className="text-[13px] leading-relaxed text-[color:var(--text-dim)] whitespace-pre-line">{obs}</p>
          ) : (
            <div className="h-full flex items-center justify-center text-[11px] text-[color:var(--text-mute)] uppercase tracking-[0.18em] text-center">
              {err || "Tippe auf Aktualisieren für deine Analyse."}
            </div>
          )}
        </div>
        <div className="pt-3 mt-2 border-t border-[color:var(--line)]">
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-[10px] uppercase tracking-[0.16em] text-[color:var(--text-mute)]">Letzte 7 Tage</div>
            <button onClick={generate} disabled={busy || !ready}
              title={ready ? "Analyse aktualisieren" : "Verfügbar nach 7 Tagen"}
              className="text-[10px] uppercase tracking-[0.16em] text-[color:var(--text-mute)] hover:text-[color:var(--text)] disabled:opacity-40 transition-colors">
              Aktualisieren
            </button>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {week.map((d, i) => (
              <div key={i} className={`text-center text-[10px] uppercase tracking-[0.15em] ${d.isToday ? "text-[color:var(--text)]" : "text-[color:var(--text-mute)]"}`}>{d.letter}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {week.map((d, i) => {
              const base = "mx-auto w-2.5 h-2.5 rounded-full";
              const cls = d.has && d.pct > 0
                ? base
                : d.isToday ? `${base} border-2 border-[color:var(--accent)]` : `${base} border border-[color:var(--line-3)]`;
              const style = d.has && d.pct > 0 ? { background: progressColor(d.pct) } : undefined;
              return <div key={i} className={cls} style={style}
                          title={`${Math.round(d.pct * 100)}% erledigt${d.isToday ? " · heute" : ""}`} />;
            })}
          </div>
        </div>
      </div>
    </WidgetShell>
  );
}

/* ---------- Sidebar ---------- */
const SIDEBAR_WIDTH_KEY = "dayone-sidebar-width";
const SIDEBAR_MIN = 220, SIDEBAR_MAX = 520;
function Sidebar({ collapsed, onToggle, context, onActions }) {
  const greet = () => {
    const h = new Date().getHours();
    const n = context?.profile?.name?.trim();
    const hi = n ? `, ${n}` : "";
    if (h >= 18 || h < 4) return `Guten Abend${hi}. Was möchtest du morgen erreichen? Sag's mir, ich plane dir den Tag.`;
    if (h < 11) return `Guten Morgen${hi}. Was steht heute an? Ich sortiere dir den Tag.`;
    return `Hi${hi}. Was möchtest du einplanen?`;
  };
  const [messages, setMessages] = useState(() => (DEMO ? DEMO_DATA.messages : [{ from: "ai", text: greet() }]));
  const [input, setInput] = useState("");
  const [recording, setRecording] = useState(false);
  const [transcribing, setTranscribing] = useState(false);
  const [busy, setBusy] = useState(false);
  const [micDevices, setMicDevices] = useState([]);
  const [selectedMicId, setSelectedMicId] = useState("");
  // Breite der Sidebar (per Maus ziehbar)
  const [sidebarWidth, setSidebarWidth] = useState(() => {
    const v = parseInt(localStorage.getItem(SIDEBAR_WIDTH_KEY) || "", 10);
    return (v >= SIDEBAR_MIN && v <= SIDEBAR_MAX) ? v : 280;
  });
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);
  const [showMicMenu, setShowMicMenu] = useState(false);
  const listRef = useRef(null);
  const recRef = useRef(null);
  const micMenuRef = useRef(null);
  const streamRef = useRef(null);
  const rotateTimerRef = useRef(null);
  const stopReqRef = useRef(false);
  const segMimeRef = useRef("audio/webm");
  // Realtime-Streaming
  const wsRef = useRef(null);
  const audioCtxRef = useRef(null);
  const procRef = useRef(null);
  const srcRef = useRef(null);
  const modeRef = useRef(null); // "realtime" | "segment"

  // Mic-Menü schließen bei Klick außerhalb
  useEffect(() => {
    if (!showMicMenu) return;
    const handler = (e) => { if (!micMenuRef.current?.contains(e.target)) setShowMicMenu(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [showMicMenu]);

  // Sidebar-Breite per Maus ziehen
  const startResize = (e) => {
    e.preventDefault();
    setDragging(true);
    const onMove = (ev) => {
      const w = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, ev.clientX));
      setSidebarWidth(w);
    };
    const onUp = () => {
      setDragging(false);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      try { localStorage.setItem(SIDEBAR_WIDTH_KEY, String(sidebarWidthRef.current)); } catch {}
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  // Aktuelle Breite in Ref halten (für Speichern beim Loslassen)
  const sidebarWidthRef = useRef(sidebarWidth);
  useEffect(() => { sidebarWidthRef.current = sidebarWidth; }, [sidebarWidth]);

  // Textfeld smooth nach oben wachsen lassen (bis ~45% der Fensterhöhe)
  const autoGrow = () => {
    const el = inputRef.current;
    if (!el) return;
    const maxH = Math.round(window.innerHeight * 0.45);
    // Höhe kurz auf auto, scrollHeight messen, dann animiert setzen
    el.style.height = "auto";
    const target = Math.min(el.scrollHeight, maxH);
    el.style.height = target + "px";
    el.style.overflowY = el.scrollHeight > maxH ? "auto" : "hidden";
  };
  useEffect(() => { autoGrow(); }, [input, recording, transcribing]);

  // Aufräumen beim Schließen
  useEffect(() => () => {
    if (rotateTimerRef.current) clearInterval(rotateTimerRef.current);
    try { recRef.current?.stop(); } catch {}
    try { wsRef.current?.close(); } catch {}
    try { procRef.current?.disconnect(); } catch {}
    try { audioCtxRef.current?.close(); } catch {}
    streamRef.current?.getTracks().forEach((t) => t.stop());
  }, []);

  // Mikrofone laden (braucht erst Permission, deshalb lazy bei Rechtsklick)
  const loadMicDevices = async () => {
    try {
      // Kurz Permission anfordern damit Labels sichtbar werden
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach(t => t.stop());
      const devices = await navigator.mediaDevices.enumerateDevices();
      setMicDevices(devices.filter(d => d.kind === "audioinput"));
    } catch {}
  };
  useEffect(() => {
    if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [messages, busy]);

  const send = async () => {
    const text = input.trim();
    if (!text || busy) return;
    const history = [...messages, { from: "user", text }];
    setMessages(history);
    setInput("");
    setBusy(true);
    try {
      const apiMessages = history.map(m => ({ role: m.from === "user" ? "user" : "assistant", content: m.text }));
      const now = new Date().toLocaleString("de-DE", { weekday: "long", day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" });
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: apiMessages, context: { ...context, now } }),
      });
      const data = await res.json();
      if (data.actions && data.actions.length && onActions) onActions(data.actions);
      setMessages(m => [...m, { from: "ai", text: data.reply || "Ok." }]);
    } catch (e) {
      setMessages(m => [...m, { from: "ai", text: "Verbindung zum Server fehlgeschlagen. Läuft der Node-Server?" }]);
    } finally {
      setBusy(false);
    }
  };

  // Diktierfunktion via OpenAI Whisper (MediaRecorder → /api/transcribe)
  // Ein Audio-Segment an Whisper schicken und Text live anhängen.
  const transcribeSegment = (blob) => {
    if (!blob || blob.size < 1200) return; // zu kurz/still → überspringen
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(",")[1];
      setTranscribing(true);
      try {
        const res = await fetch("/api/transcribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ audio: base64, mimeType: segMimeRef.current }),
        });
        const data = await res.json();
        if (data.text && data.text.trim()) {
          setInput((p) => (p ? p.replace(/\s+$/, "") + " " : "") + data.text.trim());
        } else if (data.error) {
          setMessages((m) => [...m, { from: "ai", text: `Whisper-Fehler: ${data.error}` }]);
        }
      } catch (err) {
        setMessages((m) => [...m, { from: "ai", text: `Netzwerkfehler: ${err?.message}` }]);
      } finally { setTranscribing(false); }
    };
    reader.readAsDataURL(blob);
  };

  // Ein neues Aufnahme-Segment starten (eigenständige, gültige Audiodatei).
  const startSegment = () => {
    const stream = streamRef.current;
    if (!stream) return;
    const chunks = [];
    const rec = new MediaRecorder(stream, { mimeType: segMimeRef.current });
    rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      const blob = new Blob(chunks, { type: segMimeRef.current });
      transcribeSegment(blob); // jedes Segment sofort transkribieren → live Text
      // Wenn der Nutzer gestoppt hat: Stream freigeben & UI zurücksetzen
      if (stopReqRef.current) {
        stream.getTracks().forEach((t) => t.stop());
        streamRef.current = null;
        recRef.current = null;
        setRecording(false);
      }
    };
    rec.start();
    recRef.current = rec;
  };

  // Float32-Audio → PCM16 → Base64 (für Realtime-Streaming)
  const floatToB64PCM16 = (f32) => {
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      let s = Math.max(-1, Math.min(1, f32[i]));
      i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    const bytes = new Uint8Array(i16.buffer);
    let bin = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(bin);
  };

  // ECHTES Wort-für-Wort-Streaming via OpenAI Realtime API.
  const startRealtime = async (stream) => {
    // Ephemeren Token vom Server holen
    const tokenRes = await fetch("/api/realtime-token");
    const session = await tokenRes.json();
    const EPH = session?.value || session?.client_secret?.value;
    if (!EPH) throw new Error(session?.error || "Kein Realtime-Token");

    const ws = new WebSocket("wss://api.openai.com/v1/realtime?intent=transcription", [
      "realtime",
      "openai-insecure-api-key." + EPH,
      "openai-beta.realtime-v1",
    ]);
    wsRef.current = ws;

    await new Promise((resolve, reject) => {
      ws.onopen = () => resolve();
      ws.onerror = () => reject(new Error("WebSocket-Fehler"));
      setTimeout(() => reject(new Error("Realtime-Timeout")), 6000);
    });

    // Audio mit 24 kHz erfassen und als PCM16 streamen
    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    audioCtxRef.current = ctx;
    const src = ctx.createMediaStreamSource(stream);
    srcRef.current = src;
    const proc = ctx.createScriptProcessor(4096, 1, 1);
    procRef.current = proc;
    proc.onaudioprocess = (e) => {
      if (!wsRef.current || wsRef.current.readyState !== 1) return;
      const b64 = floatToB64PCM16(e.inputBuffer.getChannelData(0));
      wsRef.current.send(JSON.stringify({ type: "input_audio_buffer.append", audio: b64 }));
    };
    // Stumm an Ausgang hängen, damit der Prozessor läuft (kein Echo)
    const mute = ctx.createGain(); mute.gain.value = 0;
    src.connect(proc); proc.connect(mute); mute.connect(ctx.destination);

    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch { return; }
      const t = msg.type || "";
      if (t.endsWith("input_audio_transcription.delta") && msg.delta) {
        // Wort/Teilwort live anhängen
        setInput((p) => p + msg.delta);
        setTranscribing(true);
      } else if (t.endsWith("input_audio_transcription.completed")) {
        // Segment fertig → Leerzeichen als Trenner
        setInput((p) => (p.endsWith(" ") ? p : p + " "));
        setTranscribing(false);
      }
    };
    ws.onclose = () => { if (modeRef.current === "realtime") cleanupAudio(); };
    modeRef.current = "realtime";
  };

  const cleanupAudio = () => {
    try { procRef.current && (procRef.current.onaudioprocess = null); } catch {}
    try { procRef.current?.disconnect(); } catch {}
    try { srcRef.current?.disconnect(); } catch {}
    try { audioCtxRef.current?.close(); } catch {}
    procRef.current = null; srcRef.current = null; audioCtxRef.current = null;
    streamRef.current?.getTracks().forEach((t) => t.stop());
    streamRef.current = null;
    setRecording(false);
    setTranscribing(false);
  };

  const toggleMic = async () => {
    // Läuft schon → stoppen
    if (recording) {
      stopReqRef.current = true;
      if (modeRef.current === "realtime") {
        // Letztes Audio flushen, kurz auf finale Wörter warten, dann schließen
        try { wsRef.current?.send(JSON.stringify({ type: "input_audio_buffer.commit" })); } catch {}
        setTimeout(() => { try { wsRef.current?.close(); } catch {} cleanupAudio(); }, 900);
      } else {
        if (rotateTimerRef.current) { clearInterval(rotateTimerRef.current); rotateTimerRef.current = null; }
        try { recRef.current?.stop(); } catch {}
      }
      return;
    }
    const audioConstraints = selectedMicId
      ? { audio: { deviceId: { exact: selectedMicId } } }
      : { audio: true };
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia(audioConstraints);
    } catch {
      setMessages((m) => [...m, { from: "ai", text: "Mikrofon-Zugriff verweigert oder Gerät nicht verfügbar." }]);
      return;
    }
    streamRef.current = stream;
    stopReqRef.current = false;
    setRecording(true);

    // 1) Echtes Streaming versuchen
    try {
      await startRealtime(stream);
      return;
    } catch (err) {
      // 2) Fallback: 4,5-s-Segmente
      try { wsRef.current?.close(); } catch {} wsRef.current = null;
      modeRef.current = "segment";
      segMimeRef.current = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/ogg";
      startSegment();
      rotateTimerRef.current = setInterval(() => {
        const old = recRef.current;
        startSegment();
        try { old?.stop(); } catch {}
      }, 4500);
    }
  };
  return (
    <aside
      className={`${collapsed ? "sidebar-collapsed" : ""} relative h-full bg-[color:var(--bg)] border-r border-[color:var(--line)] flex flex-col shrink-0`}
      style={{ width: collapsed ? 56 : sidebarWidth, transition: dragging ? "none" : "width 280ms cubic-bezier(.4,0,.2,1)" }}>
      {/* Resize-Griff am rechten Rand */}
      {!collapsed && (
        <div onMouseDown={startResize}
          className="absolute top-0 right-0 h-full w-1.5 cursor-col-resize z-30 group"
          style={{ transform: "translateX(50%)" }}
          title="Breite ziehen">
          <div className={`absolute inset-y-0 right-1/2 w-px translate-x-1/2 transition-colors
            ${dragging ? "bg-[color:var(--accent)]" : "bg-transparent group-hover:bg-[color:var(--accent)]/50"}`} />
        </div>
      )}
      <div className="flex items-center justify-between px-4 pt-5 pb-4">
        <button onClick={onToggle}
          className="text-[color:var(--text-dim)] hover:text-[color:var(--text)] p-1.5 rounded-md hover:bg-white/5 transition-colors"
          aria-label="Sidebar">
          {collapsed ? <PanelRight size={16}/> : <PanelLeft size={16}/>}
        </button>
      </div>
      <div className="px-5 pb-5 sidebar-content">
        <h1 className="text-[22px] font-semibold tracking-tight text-[color:var(--text)] leading-none">Day One</h1>
      </div>
      <div ref={listRef} className="flex-1 overflow-y-auto scroll-thin px-4 pb-4 space-y-2.5 sidebar-content">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.from === "user" ? "justify-end" : "justify-start"}`}>
            <div className={`max-w-[88%] px-3 py-2 rounded-xl text-[13px] leading-snug
              ${m.from === "user"
                ? "bg-[color:var(--accent)]/90 text-white rounded-br-sm"
                : "bg-white/[0.03] text-[color:var(--text)] rounded-bl-sm border border-[color:var(--line)]"}`}>
              {m.text}
            </div>
          </div>
        ))}
        {busy && (
          <div className="flex justify-start">
            <div className="px-3 py-2 rounded-xl rounded-bl-sm bg-white/[0.03] border border-[color:var(--line)]">
              <span className="typing"><span/><span/><span/></span>
            </div>
          </div>
        )}
      </div>
      <div className="px-4 pb-5 pt-2 sidebar-content">
        <div className="flex items-end gap-1.5 w-full bg-white/[0.04] border border-[color:var(--line-2)] rounded-xl p-1.5 focus-within:border-[color:var(--line-3)] transition-colors">
          <textarea ref={inputRef} rows={1}
            value={input}
            onChange={(e) => { if (!recording && !transcribing) setInput(e.target.value); }}
            onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder={recording ? "Sprich jetzt …" : transcribing ? "Transkribiere …" : "Nachricht …"}
            disabled={recording || transcribing}
            className="flex-1 min-w-0 self-end bg-transparent resize-none outline-none text-[14px] leading-relaxed text-[color:var(--text)] placeholder-[color:var(--text-mute)] py-1 px-2 scroll-thin"
            style={{ height: 28, overflowY: "hidden", transition: "height .18s cubic-bezier(.22,1,.36,1)" }}/>
          <div ref={micMenuRef} className="relative shrink-0 flex items-center">
            {/* Chevron: Mikrofon auswählen (vor der Aufnahme) */}
            <button onClick={() => { loadMicDevices(); setShowMicMenu(v => !v); }}
              className={`w-5 h-8 grid place-items-center rounded-l-lg transition-colors
                ${showMicMenu ? "text-[color:var(--text)] bg-white/5" : "text-[color:var(--text-mute)] hover:text-[color:var(--text)] hover:bg-white/5"}`}
              aria-label="Mikrofon wählen" title="Mikrofon wählen">
              <ChevronDown size={12} />
            </button>
            {/* Mikrofon-Button */}
            <button onClick={toggleMic}
              className={`relative w-8 h-8 grid place-items-center rounded-r-lg transition-colors
                ${recording
                  ? "mic-recording bg-[color:var(--accent)]/15 text-[color:var(--accent-2)]"
                  : "text-[color:var(--text-dim)] hover:text-[color:var(--text)] hover:bg-white/5"}`}
              aria-label={recording ? "Aufnahme stoppen" : "Diktieren"}
              title={recording ? "Stoppen" : "Diktieren"}>
              <MicIco size={15} />
            </button>

            {showMicMenu && (
              <div className="absolute bottom-11 left-1/2 -translate-x-1/2 z-[60] w-[320px] max-w-[90vw] bg-[#1c1c1c] border border-[color:var(--line-2)] rounded-xl shadow-2xl overflow-hidden">
                <div className="px-4 pt-3 pb-2.5 text-[10px] uppercase tracking-[0.2em] text-[color:var(--text-mute)] border-b border-[color:var(--line)]">
                  Mikrofon wählen
                </div>
                <div className="py-1.5 max-h-[260px] overflow-y-auto scroll-thin">
                  {micDevices.length === 0 ? (
                    <div className="px-4 py-3 text-[12px] text-[color:var(--text-dim)] leading-relaxed">
                      Lade Geräte … Falls leer: Mikrofon-Zugriff erlauben.
                    </div>
                  ) : micDevices.map((d) => {
                    const active = selectedMicId === d.deviceId || (!selectedMicId && d.deviceId === "default");
                    // "Default - Microphone (C-Media...)" → kürzen auf Kerngerätenamen
                    let label = d.label || `Mikrofon ${d.deviceId.slice(0, 6)}`;
                    label = label.replace(/\s*\([0-9a-f:]+\)\s*$/i, "").trim();
                    return (
                      <button key={d.deviceId} onClick={() => { setSelectedMicId(d.deviceId); setShowMicMenu(false); }}
                        title={d.label}
                        className={`w-full text-left px-4 py-2.5 text-[12.5px] flex items-center gap-3 transition-colors
                          ${active ? "text-[color:var(--text)] bg-white/[0.05]" : "text-[color:var(--text-dim)] hover:bg-white/[0.03] hover:text-[color:var(--text)]"}`}>
                        <span className="w-4 shrink-0 text-[color:var(--accent)]">
                          {active && <CheckIco size={14} />}
                        </span>
                        <span className="flex-1 min-w-0 leading-snug">{label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          <button onClick={send} disabled={!input.trim() || busy}
            className="w-8 h-8 shrink-0 grid place-items-center rounded-lg bg-[color:var(--accent)] text-white disabled:bg-white/5 disabled:text-[color:var(--text-mute)] hover:bg-[color:var(--accent-2)] transition-colors"
            aria-label="Senden">
            <ArrowUp size={15} stroke={2}/>
          </button>
        </div>
      </div>
    </aside>
  );
}

/* ---------- Toolbar button ---------- */
function ToolBtn({ active, onClick, ariaLabel, title, children }) {
  return (
    <button onClick={onClick} aria-label={ariaLabel} title={title}
      className={`w-9 h-9 grid place-items-center rounded-md border transition-colors
        ${active

          : "border-[color:var(--line)] text-[color:var(--text-dim)] hover:text-[color:var(--text)] hover:border-[color:var(--line-2)]"}`}>

}

/* ---------- Loading splash (handwriting "Day One") ---------- */
