/* ---------- App ---------- */
const GridLayout = window.ReactGridLayout;
// WidthProvider: grid auto-sizes to its container width (fills the page, less side margin).
const ResponsiveGrid = GridLayout.WidthProvider(GridLayout);

// Free-snap grid config. 12 columns; width is measured from the container.
const CANVAS_MAX = 1360;      // max content width (px) — wider than before, less side gap
const GRID_COLS  = 12;
const ROW_H      = 30;
const GRID_MARGIN = [14, 14];
const LAYOUT_KEY = 'dayone-layout-v3';

// Default grid placement (x/y/w/h in grid units). "todo" is a static anchor
// in the center; everything else drags, resizes and auto-compacts around it.
const DEFAULT_GRID = {
  notes:     { x: 0, y: 0,  w: 4, h: 7,  minW: 3, minH: 4 },
  spotify:   { x: 0, y: 7,  w: 4, h: 5,  minW: 3, minH: 4 },
  todo:      { x: 4, y: 0,  w: 5, h: 13, minW: 4, minH: 6, static: true },
  tagesziel: { x: 9, y: 0,  w: 3, h: 6,  minW: 3, minH: 5 },
  verlauf:   { x: 9, y: 6,  w: 3, h: 5,  minW: 3, minH: 4 },
  ki:        { x: 0, y: 13, w: 12, h: 5, minW: 4, minH: 4 },
};
const WIDGET_IDS = ["notes", "spotify", "tagesziel", "verlauf", "ki"]; // toggleable (todo always shown)
const cloneGrid = (g) => JSON.parse(JSON.stringify(g));

// Persisted app data (todos / notes / profile / history)
const DATA_KEY = 'dayone-data-v2';
const timeToMin = (t) => { const [h, m] = String(t).split(":").map(Number); return (h || 0) * 60 + (m || 0); };
const dateKey = (d = new Date()) => {
  const x = new Date(d); x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
  return x.toISOString().slice(0, 10);
};
// Clean start: no demo tasks. The user fills the day themselves or via the AI.
const DEFAULT_TODOS = [];

// Demo mode (?demo in URL): fills the app with realistic sample data for screenshots.
// Nothing is persisted while in demo mode.
const DEMO = typeof location !== "undefined" && new URLSearchParams(location.search).has("demo");
function buildDemoData() {
  const today = new Date();
  const history = {};
  const pcts = [0.55, 0.85, 0.40, 0.95, 1.0, 0.70, 0.29];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() - (6 - i));
    history[dateKey(d)] = pcts[i];
  }
  return {
    profile: {
      name: "Aaron",
      about: "27, lebe in Berlin. Baue Day One.",
      goals: "Halbmarathon im Herbst.\nMVP launchen.",
      routines: "07:00 Sport\n08:00 Journal\n22:30 Lesen",
    },
    notes: "Heute: ruhiger Vormittag.\nDeep Work bis Mittag schützen.",
    todos: [
      { time: "07:00", duration: "45 min", title: "Morgensport",         note: "5 km easy. Puls unter 145.", done: true,  doneAt: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 7, 12).toISOString() },
      { time: "08:30", duration: "30 min", title: "Journal",             note: "Drei Sätze, drei Ziele.", done: true,  doneAt: new Date(today.getFullYear(), today.getMonth(), today.getDate(), 8, 40).toISOString() },
      { time: "10:00", duration: "2 h",    title: "Deep Work — Q3 Deck", note: "Slides 7 – 12. Sprechernotizen.", done: false },
      { time: "13:30", duration: "30 min", title: "Mittag mit Lena",     note: "Kurz raus. Kein Laptop.", done: false },
      { time: "15:30", duration: "45 min", title: "Sprint Review",       note: "Demo der neuen Timeline.", done: false },
      { time: "17:30", duration: "20 min", title: "Steuerbelege Mai",    note: "Quittungen scannen.", done: false },
      { time: "21:30", duration: "30 min", title: "Lesen",               note: "Deep Work — Kapitel 4.", done: false },
    ],
    history,
    observation: "Morgens bist du stark — Sport und Journal liefen pünktlich. Nachmittags lässt der Fokus nach: Sprint Review hast du zuletzt oft verschoben. Versuch, den Q3-Block früher zu starten und den Nachmittag leichter zu halten.",
    messages: [
      { from: "ai", text: "Guten Abend, Aaron. Dein Tag ist geplant." },
      { from: "user", text: "Verschieb das Sprint Review auf 15:30." },
      { from: "ai", text: "Erledigt — Sprint Review liegt jetzt um 15:30." },
    ],
  };
}
const DEMO_DATA = DEMO ? buildDemoData() : null;

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [showGrid, setShowGrid] = useState(false);

  // Loading splash: handwriting "Day One" → fade → app.
  const [loading, setLoading] = useState(true);
  const [splashFade, setSplashFade] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setSplashFade(true), 2000);
    const t2 = setTimeout(() => setLoading(false), 2550);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  // Measure grid container width to draw the snap-raster overlay aligned to RGL cells.
  const gridWrapRef = useRef(null);
  const [gridW, setGridW] = useState(CANVAS_MAX);
  useLayoutEffect(() => {
    const measure = () => {
      if (gridWrapRef.current) {
        const w = gridWrapRef.current.getBoundingClientRect().width;
        if (w) setGridW(w);
      }
    };
    measure();
    // Tailwind (CDN) applies utility classes async, so width settles a tick later.
    const timers = [0, 80, 200, 500].map(d => setTimeout(measure, d));
    window.addEventListener("resize", measure);
    return () => { timers.forEach(clearTimeout); window.removeEventListener("resize", measure); };
  }, [collapsed]);
  // RGL column pitch including margin: lines align to where cells start.
  const cellW = (gridW - GRID_MARGIN[0] * (GRID_COLS + 1)) / GRID_COLS + GRID_MARGIN[0];

  // Load persisted layout (grid positions + visibility) once.
  const persisted = (() => {
    try {
      const raw = localStorage.getItem(LAYOUT_KEY);
      if (!raw) return null;
      const p = JSON.parse(raw);
      return (p && typeof p === 'object') ? p : null;
    } catch { return null; }
  })();

  // gridPos: id -> {x,y,w,h,minW,minH,static}. Holds positions for ALL widgets
  // (even hidden ones) so re-adding a widget restores its spot.
  const [gridPos, setGridPos] = useState(() => {
    const base = cloneGrid(DEFAULT_GRID);
    if (persisted?.gridPos) {
      Object.keys(base).forEach(k => {
        if (persisted.gridPos[k]) base[k] = { ...base[k], ...persisted.gridPos[k], static: base[k].static };
      });
    }
    return base;
  });
  const [visible, setVisible] = useState(persisted?.visible || {
    notes: true, spotify: true, tagesziel: true, verlauf: true, ki: true
  });

  useEffect(() => {
    if (DEMO) return;
    try { localStorage.setItem(LAYOUT_KEY, JSON.stringify({ gridPos, visible })); } catch {}
  }, [gridPos, visible]);

  const resetLayout = () => {
    try { localStorage.removeItem(LAYOUT_KEY); } catch {}
    setGridPos(cloneGrid(DEFAULT_GRID));
    setVisible({ notes: true, spotify: true, tagesziel: true, verlauf: true, ki: true });
  };

  // Build the layout array RGL consumes: todo (always) + visible widgets.
  const layout = useMemo(() => {
    const ids = ["todo", ...WIDGET_IDS.filter(k => visible[k])];
    return ids.map(id => ({ i: id, ...gridPos[id] }));
  }, [gridPos, visible]);

  const onLayoutChange = useCallback((next) => {
    setGridPos(prev => {
      const updated = { ...prev };
      next.forEach(item => {
        if (!updated[item.i]) return;
        updated[item.i] = { ...updated[item.i], x: item.x, y: item.y, w: item.w, h: item.h };
      });
      return updated;
    });
  }, []);

  const toggleWidget = (k) => setVisible(s => ({ ...s, [k]: !s[k] }));
  const hide = (k) => setVisible(s => ({ ...s, [k]: false }));

  // --- Persisted app data (todos / notes / profile) ---
  const savedData = (() => {
    try { const r = localStorage.getItem(DATA_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
  })();
  const [notes, setNotes] = useState(DEMO ? DEMO_DATA.notes : (savedData?.notes ?? ""));
  const [profile, setProfile] = useState(DEMO ? DEMO_DATA.profile : (savedData?.profile ?? { name: "", about: "", goals: "", routines: "" }));
  // New day → start with an empty list (you plan each day fresh). Otherwise load
  // saved tasks, re-keyed with fresh unique ids (self-heals duplicate-id data).
  const isNewDay = savedData?.day && savedData.day !== dateKey();
  const [todos, setTodos] = useState(() =>
    DEMO ? DEMO_DATA.todos.map((t, i) => ({ ...t, id: i + 1 }))
    : (isNewDay || !Array.isArray(savedData?.todos)) ? []
    : savedData.todos.map((t, i) => ({ ...t, id: i + 1 }))
  );
  const [dayStamp, setDayStamp] = useState(dateKey());
  // Real daily completion history for the Verlauf widget: { "YYYY-MM-DD": pct }
  const [history, setHistory] = useState(DEMO ? DEMO_DATA.history : (savedData?.history ?? {}));

  // Reset the list at midnight (and whenever the day rolls over while open).
  const resetForNewDay = useCallback(() => {
    if (DEMO) return;
    setTodos([]); setExpandedId(null); setEditId(null); setDayStamp(dateKey());
  }, []);
  useEffect(() => {
    const now = new Date();
    const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
    const t = setTimeout(resetForNewDay, nextMidnight - now);
    return () => clearTimeout(t);
  }, [dayStamp, resetForNewDay]);
  // Latest KI-Beobachtung text — fed back into chat so suggestions adapt over time.
  const [observation, setObservation] = useState(() => {
    if (DEMO) return DEMO_DATA.observation;
    try { return JSON.parse(localStorage.getItem("dayone-observation-v1") || "null")?.text || ""; } catch { return ""; }
  });

  // Save data whenever it changes (day stamp lets us detect a new day on next load).
  // Demo mode never persists.
  useEffect(() => {
    if (DEMO) return;
    try { localStorage.setItem(DATA_KEY, JSON.stringify({ todos, notes, profile, history, day: dayStamp })); } catch {}
  }, [todos, notes, profile, history, dayStamp]);

  // Sort by time so inserted tasks land in the right slot
  const sortByTime = (list) => [...list].sort((a, b) => timeToMin(a.time) - timeToMin(b.time));
  // Monotonic id counter — guarantees unique ids even for several adds in one tick.
  // Initialised past the highest re-keyed id (= number of loaded tasks).
  const idRef = useRef(Array.isArray(savedData?.todos) ? savedData.todos.length : DEFAULT_TODOS.length);
  const nextTodoId = () => (idRef.current += 1);

  const addTask = ({ time = "12:00", title = "Neue Aufgabe", duration = "", note = "" } = {}) => {
    const t = { id: nextTodoId(), time, title, duration, note, done: false };
    setTodos(ts => sortByTime([...ts, t]));
    return t.id;
  };
  const updateTask = (id, patch) =>
    setTodos(ts => sortByTime(ts.map(t => t.id === id ? { ...t, ...patch } : t)));

  // "+ Aufgabe": create a blank task at the next half hour and open it in edit mode.
  const handleAddTask = () => {
    const now = new Date();
    const half = now.getMinutes() < 30;
    const h = (half ? now.getHours() : now.getHours() + 1) % 24;
    const time = `${String(h).padStart(2, "0")}:${half ? "30" : "00"}`;
    const id = addTask({ time, title: "" });
    setExpandedId(id);
    setEditId(id);
  };

  useEffect(() => {
    if (expandedId == null) return;
    const onKey = (e) => { if (e.key === "Escape") setExpandedId(null); };
    const onClick = (e) => {
      if (!e.target.closest?.(".task-box.expanded")) setExpandedId(null);
    };
    window.addEventListener("keydown", onKey);
    window.addEventListener("mousedown", onClick);
    return () => {
      window.removeEventListener("keydown", onKey);
      window.removeEventListener("mousedown", onClick);
    };
  }, [expandedId]);

  // Live clock — drives the "now" line and the active-task highlight.
  const [nowMin, setNowMin] = useState(() => { const d = new Date(); return d.getHours() * 60 + d.getMinutes(); });
  useEffect(() => {
    const tick = () => { const d = new Date(); setNowMin(d.getHours() * 60 + d.getMinutes()); };
    const id = setInterval(tick, 30000);
    return () => clearInterval(id);
  }, []);

  // Tasks sorted by time (loaded data may be unsorted).
  const sortedTodos = useMemo(() => sortByTime(todos), [todos]);

  // Index where the "now" line sits among the sorted tasks.
  const nowInsertIdx = useMemo(() => {
    const i = sortedTodos.findIndex(t => timeToMin(t.time) > nowMin);
    return i === -1 ? sortedTodos.length : i;
  }, [sortedTodos, nowMin]);

  const nowId = useMemo(() => {
    let active = null;
    for (const t of sortedTodos) {
      if (t.done) continue;
      if (nowMin >= timeToMin(t.time)) active = t.id;
    }
    return active;
  }, [sortedTodos, nowMin]);

  const dateString = useMemo(() => {
    const d = new Date();
    return d.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" });
  }, []);

  const greeting = useMemo(() => {
    const h = new Date().getHours();
    if (h < 5)  return "Noch wach";
    if (h < 11) return "Guten Morgen";
    if (h < 17) return "Guten Tag";
    if (h < 22) return "Guten Abend";
    return "Späte Stunde";
  }, []);

  const toggle = (id) => setTodos(ts => ts.map(t => t.id === id
    ? { ...t, done: !t.done, doneAt: !t.done ? new Date().toISOString() : null }
    : t));
  const remove = (id) => { setTodos(ts => ts.filter(t => t.id !== id)); setExpandedId(null); };
  // Cancelling the editor on a still-empty (just-added) task removes it again.
  const cancelEdit = (id) => {
    setEditId(null);
    setTodos(ts => ts.filter(t => !(t.id === id && !String(t.title || "").trim())));
    setExpandedId(null);
  };

  // Apply tool actions returned by the AI assistant.
  const applyChatActions = useCallback((actions = []) => {
    actions.forEach(a => {
      const ar = a.args || {};
      if (a.name === "add_task") addTask({ time: ar.time, title: ar.title, duration: ar.duration || "", note: ar.note || "" });
      else if (a.name === "toggle_task") setTodos(ts => ts.map(t => t.id === ar.id ? { ...t, done: !!ar.done } : t));
      else if (a.name === "delete_task") setTodos(ts => ts.filter(t => t.id !== ar.id));
      else if (a.name === "set_note") setNotes(ar.text || "");
    });
  }, []);

  const total = todos.length;
  const done = todos.filter(t => t.done).length;

  // Log today's completion ratio into history (drives the Verlauf widget).
  useEffect(() => {
    const today = dateKey();
    const pct = total ? done / total : 0;
    setHistory(h => (h[today] === pct ? h : { ...h, [today]: pct }));
  }, [done, total]);

  // Last 7 days for the Verlauf graph, from real history.
  const verlaufDays = useMemo(() => {
    const out = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = dateKey(d);
      out.push({
        wd: d.toLocaleDateString("de-DE", { weekday: "narrow" }),
        p: history[key] ?? 0,
        has: key in history,
      });
    }
    return out;
  }, [history]);

  return (
    <div className="h-full w-full flex">
      {loading && <LoadingSplash fading={splashFade} />}
      <Sidebar collapsed={collapsed} onToggle={() => setCollapsed(c => !c)}
               context={{ todos, notes, profile, history, observation }} onActions={applyChatActions} />

      <main className="flex-1 h-full overflow-y-auto scroll-thin">
        <div className="mx-auto pt-10 pb-20 px-8" style={{ width: "100%", maxWidth: CANVAS_MAX }}>

          {/* Header */}
          <div className="flex items-start justify-between mb-6">
            <div className="min-w-0">
              <div className="flex items-center gap-3 flex-wrap">
                <div className="text-[11px] uppercase tracking-[0.2em] text-[color:var(--text-mute)]">
                  {dateString}
                </div>
                <div className="flex items-center gap-1.5">
                  <ToolBtn active={visible.notes} onClick={() => toggleWidget("notes")}
                           ariaLabel="Notizen" title="Notizen">
                    <NoteIco size={14}/>
                  </ToolBtn>
                  <ToolBtn active={visible.tagesziel} onClick={() => toggleWidget("tagesziel")}
                           ariaLabel="Tagesziel" title="Tagesziel">
                    <TargetIco size={14}/>
                  </ToolBtn>
                  <ToolBtn active={visible.verlauf} onClick={() => toggleWidget("verlauf")}
                           ariaLabel="Verlauf" title="Verlauf">
                    <TrendIco size={14}/>
                  </ToolBtn>
                  <ToolBtn active={visible.spotify} onClick={() => toggleWidget("spotify")}
                           ariaLabel="Musik" title="Musik">
                    <MusicIco size={14}/>
                  </ToolBtn>
                  <ToolBtn active={visible.ki} onClick={() => toggleWidget("ki")}
                           ariaLabel="KI-Beobachtung" title="KI-Beobachtung">
                    <EyeIco size={14}/>
                  </ToolBtn>
                  <span className="w-px h-5 bg-[color:var(--line)] mx-1" />
                  <ToolBtn onClick={resetLayout}
                           ariaLabel="Layout zurücksetzen" title="Layout zurücksetzen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
                      <path d="M3 3v5h5" />
                    </svg>
                  </ToolBtn>
                </div>
              </div>
              <h1 className="text-[36px] font-semibold tracking-tight text-[color:var(--text)] leading-[1.05] mt-3">
                {profile.name?.trim() ? `${greeting}, ${profile.name.trim()}.` : `${greeting}.`}
              </h1>
            </div>
            <button onClick={() => setModalOpen(true)}
              className="shrink-0 flex items-center gap-2 pl-1 pr-3 py-1 rounded-full border border-[color:var(--line)] hover:border-[color:var(--line-2)] text-[color:var(--text-dim)] hover:text-[color:var(--text)] text-[12.5px] transition-colors">
              <span className="w-6 h-6 rounded-full bg-white/[0.04] border border-[color:var(--line)] flex items-center justify-center">
                <UserIco size={11}/>
              </span>
              Personal
            </button>
          </div>

          {/* Single continuous orange progress line */}
          <div className="w-full h-[2px] rounded-full bg-[color:var(--accent)] opacity-90 mb-10"
               style={{ boxShadow: "0 0 8px rgba(217,122,74,0.4)" }} />

          {/* Canvas: free-snap grid (drag anywhere, snaps to the invisible raster) */}
          <div ref={gridWrapRef}
               className={`grid-wrap ${showGrid ? "show-grid" : ""}`}
               style={{ "--cell-w": cellW + "px", "--cell-h": (ROW_H + GRID_MARGIN[1]) + "px" }}>
          <ResponsiveGrid
            className="layout"
            cols={GRID_COLS}
            rowHeight={ROW_H}
            margin={GRID_MARGIN}
            layout={layout}
            onLayoutChange={onLayoutChange}
            draggableHandle=".widget-title"
            draggableCancel=".no-drag"
            resizeHandles={['s','e','n','w','se','sw','ne','nw']}
            compactType="vertical"
            preventCollision={false}
            isBounded={false}>

            {/* Timeline — static anchor in the center */}
            <div key="todo" className="todo-cell">
              <div className="heute-label">Heute</div>
              <div className="todo-scroll scroll-thin">
                {sortedTodos.map((t, i) => (
                  <React.Fragment key={t.id}>
                    {i === nowInsertIdx && <NowMarker min={nowMin} />}
                    <TodoRow
                      todo={t} idx={i} isNow={t.id === nowId}
                      expanded={expandedId === t.id}
                      startEditing={editId === t.id}
                      onExpand={(id) => setExpandedId(id)}
                      onCollapse={() => setExpandedId(null)}
                      onToggle={toggle} onDelete={remove} onUpdate={updateTask} onCancel={cancelEdit}
                    />
                  </React.Fragment>
                ))}
                {nowInsertIdx >= sortedTodos.length && <NowMarker min={nowMin} />}
                <div className="grid items-start" style={{ gridTemplateColumns: "54px 18px 1fr" }}>
                  <div />
                  <div className="relative flex justify-center pt-2.5">
                    <span className="relative z-10 w-[7px] h-[7px] rounded-full border border-dashed border-[rgba(255,255,255,0.18)] bg-[color:var(--bg)]" />
                  </div>
                  <button onClick={handleAddTask}
                    className="text-left w-full flex items-center gap-2 px-3 py-2 rounded-lg text-[13px] text-[color:var(--text-mute)] hover:text-[color:var(--text)] hover:bg-white/[0.02] transition-colors">
                    <PlusIco size={13}/> Aufgabe
                  </button>
                </div>
              </div>
            </div>

            {visible.notes && (
              <div key="notes">
                <NotesWidget value={notes} setValue={setNotes} onDismiss={() => hide("notes")} />
              </div>
            )}
            {visible.spotify && (
              <div key="spotify">
                <YouTubeWidget onDismiss={() => hide("spotify")} />
              </div>
            )}
            {visible.tagesziel && (
              <div key="tagesziel">
                <TageszielWidget done={done} total={total} onDismiss={() => hide("tagesziel")} />
              </div>
            )}
            {visible.verlauf && (
              <div key="verlauf">
                <VerlaufWidget days={verlaufDays} onDismiss={() => hide("verlauf")} />
              </div>
            )}
            {visible.ki && (
              <div key="ki">
                <KIObservationWidget data={{ todos, notes, profile, history, observation }}
                                     onObservation={setObservation} onDismiss={() => hide("ki")} />
              </div>
            )}
          </ResponsiveGrid>
          </div>

        </div>
      </main>

      <PersonalModal
        open={modalOpen}
        onClose={() => setModalOpen(false)}
        profile={profile}
        setProfile={setProfile}
        onResetLayout={resetLayout}
        showGrid={showGrid}
        setShowGrid={setShowGrid}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
